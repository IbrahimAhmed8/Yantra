name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npm run build # Verifies TypeScript compiles
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Define environment variables based on the branch
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ github.ref == 'refs/heads/main' && secrets.PRODUCTION_PROJECT_ID || secrets.STAGING_PROJECT_ID }}
      DB_PASSWORD: ${{ github.ref == 'refs/heads/main' && secrets.PRODUCTION_DB_PASSWORD || secrets.STAGING_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1

      # Link to the correct project and push migrations
      - run: supabase link --project-ref $PROJECT_ID
      - run: supabase db push --password $DB_PASSWORD

      # Step for App Deployment (Example: Render, Heroku, or AWS)
      # - name: Deploy to Hosting
      #   run: ... your hosting provider's deploy command ...
